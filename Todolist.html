<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Professionl JS To-Do List</title>
    <meta name="author" content="Diogo Rangel Dos Santos">
    <meta name="description" content="A simple to-do list application built with JavaScript - Diogo Rangel">
    <link rel="stylesheet" href="styles/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
   <div class="container">
    <h1>My tasks</h1>
    <div class="input-grid">
        <input type="text" id="cardName" placeholder="Enter a new task">
        <input type="date" id="taskDate" placeholder="Enter a due date">
        <input type="text" id="assignee" placeholder="Enter an assignee">
        <input type="text" id="creator" placeholder="Enter creator name">
        <textarea id="description" placeholder="Description"></textarea>
    </div>
    <button id="addButton">Create Card</button>
    <div id="cardContainer"></div>
</div>
</div>
    <script src="scripts/script.js"></script>
</body>
</html>
