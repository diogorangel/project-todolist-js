name: Code Quality Check

# This action runs every time you push code to GitHub
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run a simple check
        run: |
          echo "Analyzing JavaScript for errors..."
          # This simple command checks if the files exist and are readable
          ls -R
          echo "Code quality check passed!"